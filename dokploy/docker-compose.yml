version: '3.8'

services:
  album-splitter:
    build:
      context: ..
      dockerfile: dokploy/Dockerfile
    container_name: album-splitter
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./output:/app/output
      - ./splits:/app/splits
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_APP=album_splitter.web
      - UPLOAD_FOLDER=/app/uploads
      - OUTPUT_FOLDER=/app/output
      - SECRET_KEY=change-this-in-production
      - LOG_LEVEL=INFO
    restart: unless-stopped
