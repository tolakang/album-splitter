version: '3.8'

services:
  album-splitter:
    build:
      context: ..
      dockerfile: dokploy/Dockerfile
    container_name: album-splitter
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./splits:/app/splits
    environment:
      - PYTHONUNBUFFERED=1
      - OUTPUT_FOLDER=/app/output
      - TEMP_FOLDER=/app/input
      - LOG_LEVEL=INFO
    # Run album-splitter with default command to split input files
    command: >
      sh -c "ls /app/input/*.mp3 2>/dev/null && for f in /app/input/*.mp3; do
        echo \"Splitting: $$f\";
        album-splitter -f \"$$f\" -o /app/splits;
      done || echo 'No MP3 files found in /app/input/'"
